@if (project(); as p) {
  <div class="detail-container">

    <div class="back-link-wrapper">
      <a class="back-link" routerLink="/work" [queryParams]="backQueryParams()"><span aria-hidden="true" class="back-arrow"></span>BACK TO PROJECTS</a>
    </div>

    <div class="info-section">
      <div class="info-left">
        <h1 class="project-title">{{ p.title }}</h1>
        <p class="project-client">{{ p.client }}</p>
      </div>
      <div class="info-right">
        <p class="project-category">{{ (p.categories && p.categories.length ? p.categories.join(' / ') : p.category) }}</p>
        @if (p.description) {
          <div class="project-description" [innerHTML]="formatText(p.description)"></div>
        }
        @if (p.credits) {
          <div class="project-credits" [innerHTML]="formatText(p.credits)"></div>
        }
      </div>
    </div>

    <div class="hero-image-container">
      <img class="hero-image" [src]="p.detailImage || p.image" [alt]="p.title" />
    </div>

    @if (p.images && p.images.length > 0) {
      <div class="gallery-grid">
        @for (img of p.images; track img) {
          <img class="gallery-image" [src]="img" [alt]="p.title" />
        }
      </div>
    }

  </div>
}
