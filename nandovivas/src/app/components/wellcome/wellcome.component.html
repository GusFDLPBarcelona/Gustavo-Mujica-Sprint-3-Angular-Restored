@if (imagesGallery().length > 0) {
  <div class="carousel-wrapper"
       (mousemove)="onMouseMove()"
       (mouseleave)="onMouseLeave()"
       [class.nav-visible]="navVisible()">
    <owl-carousel-o
      #owlCarousel
      [options]="carouselOptions"
      class="fullscreen-carousel">

      @for (image of imagesGallery(); track image.id) {
        <ng-template carouselSlide>
          <div class="carousel-item">
            <img
              [src]="image.image_path"
              alt="{{ image.title }}"
              class="carousel-image" />

            <div class="carousel-caption">
              <p class="image-info">
                <span class="image-title">{{ image.title.toUpperCase() }}</span>
                <span class="image-client">{{ image.client }}</span>
              </p>
            </div>
          </div>
        </ng-template>
      }

    </owl-carousel-o>

    <button class="carousel-nav carousel-prev" (click)="previousSlide()" aria-label="Anterior">
      <span class="nav-arrow nav-arrow-prev"></span>
    </button>
    <button class="carousel-nav carousel-next" (click)="nextSlide()" aria-label="Siguiente">
      <span class="nav-arrow nav-arrow-next"></span>
    </button>
  </div>
}
